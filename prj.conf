CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_ASYNC_API=y

# --- Bluetooth Peripheral/GATT ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AB-Async"
CONFIG_BT_DEVICE_APPEARANCE=0

# GATT/ATT (default MTU gives 20 B payload; keep simple)
CONFIG_BT_ATT_PREPARE_COUNT=0
# Optional: increase ATT MTU if you plan >20B later
# CONFIG_BT_BUF_ACL_RX_SIZE=251
# CONFIG_BT_L2CAP_TX_MTU=247
